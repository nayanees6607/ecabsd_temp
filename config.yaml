data:
  ligand_distance_cutoff: 4.5
  pdb_dir: data/raw/pdbs
  processed_dir: data/db5_processed
  raw_dir: data/raw
  splits_csv: data/db5_splits.csv

model:
  dropout: 0.5
  edge_feature_dim: 5
  graph_cutoff: 10.0
  hidden_dim: 128
  input_dim: 33
  num_gcn_layers: 4
  num_heads: 4
  num_cross_attn_layers: 2
  residue_max: 800
  residue_min: 30

training:
  batch_size: 4
  early_stopping_patience: 60
  epochs: 200
  focal_alpha: 0.90
  focal_gamma: 2.0
  gradient_clip: 0.5
  label_smoothing: 0.05
  learning_rate: 0.0002
  loss: focal
  lr_factor: 0.5
  lr_patience: 15
  lr_scheduler: cosine_warmup
  num_workers: 0
  seed: 42
  warmup_epochs: 10
  weight_decay: 0.01

prediction:
  output_format: csv
  threshold: 0.5

paths:
  checkpoints_dir: checkpoints
  logs_dir: logs
  results_dir: results

web:
  checkpoint: checkpoints/best_model.pt
  host: 0.0.0.0
  port: 8000

docking:
  box_padding: 5.0
  energy_range: 3
  exhaustiveness: 8
  num_modes: 9
  vina_executable: vina
